<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <link rel="stylesheet" href="{{url_for('static', filename='style.css')}}">
</head>
<body>
    <h1>Password Generator</h1>
    <a href="/">Back to Home</a>
    <form method="POST">
        <label for="length">Password Length:</label><br>
        <input type="number" id="length" name="length" value="{{ request.form.get('length', 12) }}" min="1"><br><br>
        <label for="uppercase">
            <input type="checkbox" id="uppercase" name="uppercase" {% if request.form.get('uppercase') %}checked{% endif %}>
            Include Uppercase Letters
        </label><br>
        <label for="lowercase">
            <input type="checkbox" id="lowercase" name="lowercase" {% if request.form.get('lowercase') %}checked{% endif %}>
            Include Lowercase Letters
        </label><br>
        <label for="digits">
            <input type="checkbox" id="digits" name="digits" {% if request.form.get('digits') %}checked{% endif %}>
            Include Digits
        </label><br>
        <label for="special">
            <input type="checkbox" id="special" name="special" {% if request.form.get('special') %}checked{% endif %}>
            Include Special Characters
        </label><br><br>
        <button type="submit">Generate Password</button>
    </form>
    {% if password %}
        <h2>Generated Password:</h2>
        <p>{{ password }}</p>
    {% endif %}
    {% if error %}
        <h2>Error:</h2>
        <p style="color: red;">{{ error }}</p>
    {% endif %}
</body>
</html>
