<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <link rel="stylesheet" href="static/style.css">
</head>
<body>
    <h1>Password Generator</h1>
    <a href="/">Back to Home</a>
    <form method="POST">
        <label for="length">Password Length:</label><br>
        <input type="number" id="length" name="length" value="{{ request.form.get('length', 12) }}" min="1"><br><br>
        <label for="include_uppercase">
            <input type="checkbox" id="include_uppercase" name="include_uppercase" {% if request.form.get('include_uppercase') %}checked{% endif %}>
            Include Uppercase Letters
        </label><br>
        <label for="include_lowercase">
            <input type="checkbox" id="include_lowercase" name="include_lowercase" {% if request.form.get('include_lowercase') %}checked{% endif %}>
            Include Lowercase Letters
        </label><br>
        <label for="include_digits">
            <input type="checkbox" id="include_digits" name="include_digits" {% if request.form.get('include_digits') %}checked{% endif %}>
            Include Digits
        </label><br>
        <label for="include_special">
            <input type="checkbox" id="include_special" name="include_special" {% if request.form.get('include_special') %}checked{% endif %}>
            Include Special Characters
        </label><br><br>
        <button type="submit">Generate Password</button>
    </form>
    {% if password %}
        <h2>Generated Password:</h2>
        <p>{{ password }}</p>
    {% endif %}
    {% if error %}
        <h2>Error:</h2>
        <p style="color: red;">{{ error }}</p>
    {% endif %}
</body>
</html>
